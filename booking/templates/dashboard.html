{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
        }

        .card {
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .chart-box {
            height: 300px;
        }
        .card {
            border-radius: 15px;
            transition: 0.3s;
            padding: 15px;
     }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

<!-- 🧭 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 py-3">
    <span class="navbar-brand">🌿 Turf Booking</span>

    <div>
        <a class="btn btn-light me-2" href="/">Dashboard</a>
        <a class="btn btn-primary me-2" href="/turfs/">Turfs</a>
        <a class="btn btn-danger" href="/logout/">Logout</a>
    </div>
</nav>

<!-- 📊 STATS -->
<div class="container mt-4">
    <div class="row text-center">

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h6>Total Bookings</h6>
                <h3>{{ total_bookings }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h6>Upcoming</h6>
                <h3>{{ upcoming }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h6>Payments</h6>
                <h3>{{ total_payments }}</h3>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow">
                <h6>Total Spent</h6>
                <h3>₹{{ total_spent }}</h3>
            </div>
        </div>

    </div>
</div>

<!-- 📈 CHARTS -->
<div class="container mt-5">
    <div class="row">

        <!-- 📈 LINE CHART -->
        <div class="col-md-6">
            <div class="card p-3 shadow chart-box">
                <h5 class="text-center">📈 Booking Trend</h5>
                <canvas id="lineChart"></canvas>
            </div>
        </div>

        <!-- 🍩 DOUGHNUT CHART (FIXED SIZE) -->
        <div class="col-md-6">
            <div class="card p-3 shadow text-center">

                <h5>📊 Turf Bookings</h5>

                <div style="width:250px; height:250px; margin:auto;">
                    <canvas id="doughnutChart"></canvas>
                </div>

            </div>
        </div>

    </div>
</div>

<!-- 📊 SCRIPT -->
<script>
const dates = {{ dates|default:'[]'|safe }};
const counts = {{ counts|default:'[]'|safe }};
const turfNames = {{ turf_names|default:'[]'|safe }};
const turfCounts = {{ turf_counts|default:'[]'|safe }};

// 📈 LINE CHART
new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
        labels: dates.length ? dates : ["No Data"],
        datasets: [{
            label: "Bookings",
            data: counts.length ? counts : [0],
            fill: true,
            tension: 0.5,
            borderColor: "#00c6ff",
            backgroundColor: "rgba(0,198,255,0.2)",
            pointBackgroundColor: "#00c6ff"
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        }
    }
});

// 🍩 DOUGHNUT CHART (PERFECT CIRCLE)
new Chart(document.getElementById('doughnutChart'), {
    type: 'doughnut',
    data: {
        labels: turfNames.length ? turfNames : ["No Data"],
        datasets: [{
            data: turfCounts.length ? turfCounts : [1],
            backgroundColor: [
                "#28a745",  // green = confirmed
                "#dc3545"   // red = cancelled
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,  // 🔥 FIXES OVAL ISSUE
        cutout: "70%",
        plugins: {
            legend: {
                position: "bottom"
            }
        }
    }
});
</script>

</body>
</html>
