<!DOCTYPE html>
<html>
<head>
    <title>Receipt</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        padding: 25px;
        border-radius: 15px;
        width: 350px;
    }

    .success {
        color: green;
        font-weight: bold;
    }
    </style>
</head>

<body>

<div class="card shadow text-center">

    <h4 class="success">✔ Payment Successful</h4>
    <p>Thanks for booking our turf 💜</p>

    <hr>

    <p><b>Turf:</b> {{ slot.turf.name }}</p>
    <p><b>Date:</b> {{ slot.date }}</p>
    <p><b>Time:</b> {{ slot.time }}</p>
    <p><b>Amount:</b> ₹{{ payment.amount }}</p>

    <hr>

    <p><b>Transaction ID:</b><br>
    {{ payment.transaction_id }}</p>

    <p>Status: <span class="success">Paid</span></p>

    <a href="/" class="btn btn-success w-100 mt-2">Go to Dashboard</a>

</div>

</body>
</html>
